services:
  db:
    image: postgres:16-alpine
    container_name: greenstore_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-greenstore_prod}
      POSTGRES_USER: ${DB_USER:-greenstore_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-gs_prod_secure_pass_9921}
      LANG: pt_BR.utf8
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: greenstore_redis
    restart: always
    command: redis-server --bind 0.0.0.0
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    container_name: greenstore_app
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - ./logs:/home/node/app/logs
      - ./backups:/home/node/app/backups
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - ADMIN_BOOTSTRAP_TOKEN=${ADMIN_BOOTSTRAP_TOKEN}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - DB_POOL_MAX=25
      - LOG_LEVEL=error
    command: sh -c "npm start"

volumes:
  db-data:
