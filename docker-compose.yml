services:
  db:
    image: postgres:16-alpine
    container_name: greenstore_db
    restart: always
    environment:
      POSTGRES_DB: greenstore
      POSTGRES_USER: greenstore
      POSTGRES_PASSWORD: greenstore_password
      LANG: pt_BR.utf8
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U greenstore"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: greenstore_redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: greenstore_app
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgres://greenstore:greenstore_password@db:5432/greenstore
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - ADMIN_BOOTSTRAP_TOKEN=${ADMIN_BOOTSTRAP_TOKEN}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - DB_POOL_MAX=20
      - LOG_LEVEL=warn
    # Removido o seed automático para acelerar o boot diário. 
    # Se precisar de dados de teste, rode manualmente uma vez: docker compose exec app node scripts/seed-test-users.js
    command: sh -c "npm start"
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - node_modules/
            - frontend/node_modules/
        - action: rebuild
          path: package.json
        - action: rebuild
          path: frontend/package.json

volumes:
  db-data:
