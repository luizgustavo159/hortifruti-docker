services:
  db:
    image: postgres:16-alpine
    container_name: greenstore_db
    restart: always
    environment:
      POSTGRES_DB: greenstore_prod
      POSTGRES_USER: greenstore_admin
      POSTGRES_PASSWORD: gs_prod_secure_pass_9921
      LANG: pt_BR.utf8
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U greenstore_admin -d greenstore_prod"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: greenstore_redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: greenstore_app
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgres://greenstore_admin:gs_prod_secure_pass_9921@db:5432/greenstore_prod
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - ADMIN_BOOTSTRAP_TOKEN=${ADMIN_BOOTSTRAP_TOKEN}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - DB_POOL_MAX=25
      - LOG_LEVEL=error
    command: sh -c "npm start"

volumes:
  db-data:
